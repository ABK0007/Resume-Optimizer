<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Optimizer</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.6/lottie.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script> <!-- PDF.js -->
</head>
<body>
  <div class="container">
    <div id="image-container"><img src="./imgs/first.jpg" alt=""></div>
    <h1>Optimize Your Resume for ATS</h1>
    <form id="resumeForm">
      <label for="resumeFile">Upload Your Resume (PDF):</label>
      <input type="file" id="resumeFile" accept="application/pdf" required />

      <label for="jobFile">Upload Job Description (PDF):</label>
      <input type="file" id="jobFile" accept="application/pdf" required />

      <button type="submit">Analyze</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
