<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Optimizer</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        h1 {
            text-align: center;
        }

        #image-container {
            text-align: center;
            margin-bottom: 20px;
        }

        #image-container img {
            max-width: 100%;
            height: auto;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            font-weight: bold;
        }

        input[type="file"] {
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="image-container">
            <img src="./imgs/first.jpg" alt="Resume Optimization">
        </div>
        <h1>Optimize Your Resume for ATS</h1>
        <form id="resumeForm">
            <label for="resumeFile">Upload Your Resume (PDF):</label>
            <input type="file" id="resumeFile" accept="application/pdf" required />

            <label for="jobFile">Upload Job Description (PDF):</label>
            <input type="file" id="jobFile" accept="application/pdf" required />

            <button type="submit">Analyze</button>
        </form>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';

        function extractTextFromPDF(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function() {
                    const typedArray = new Uint8Array(reader.result);
                    pdfjsLib.getDocument(typedArray).promise.then(pdf => {
                        let textContent = '';
                        const numPages = pdf.numPages;

                        const pagePromises = [];
                        for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                            pagePromises.push(pdf.getPage(pageNum).then(page => {
                                return page.getTextContent().then(text => {
                                    textContent += text.items.map(item => item.str).join(' ') + '\n';
                                }));
                            }));
                        }

                        Promise.all(pagePromises).then(() => {
                            resolve(textContent);
                        }).catch(reject);
                    }).catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        document.getElementById('resumeForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const resumeFile = document.getElementById('resumeFile').files[0];
            const jobFile = document.getElementById('jobFile').files[0];

            if (!resumeFile || !jobFile) {
                alert('Please upload both PDF files');
                return;
            }

            Promise.all([extractTextFromPDF(resumeFile), extractTextFromPDF(jobFile)]).then(([resumeText, jobText]) => {
                localStorage.setItem('resume', resumeText);
                localStorage.setItem('job', jobText);
                window.location.href = 'result.html';
            }).catch(error => {
                alert('Failed to extract text from PDFs');
                console.error(error);
            });
        });
    </script>
</body>

</html>
